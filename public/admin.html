<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEDAS DUWIT - Super User Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 font-sans text-slate-100 p-6 antialiased min-h-screen">

    <!-- Sistem Proteksi Halaman -->
    <script>
        if (localStorage.getItem('sipedas_peran') !== 'admin') {
            alert('Akses ditolak! Halaman ini khusus Super User Admin.');
            window.location.href = '/login.html';
        }
    </script>

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header Utama -->
        <div class="bg-gradient-to-r from-red-900 to-slate-900 p-6 rounded-2xl shadow-xl border border-red-800/30 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-red-500">PANEL UTAMA SUPER ADMIN</h1>
                <p class="text-xs text-slate-400 mt-1">SIPEDAS DUWIT • Kendali Pusat Data & Referensi Internal</p>
            </div>
            <button onclick="localStorage.clear(); window.location.href='/login.html';" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-4 py-2.5 rounded-xl transition shadow-md">
                Keluar Sistem (Logout)
            </button>
        </div>

        <!-- Layout 2 Kolom -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- KOLOM KIRI: LOG & STATUS SURAT (2/3 Lebar) -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Kartu Status Ringkas -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 text-center shadow-sm">
                        <p class="text-xs text-slate-400 uppercase font-semibold">Total Berkas Surat</p>
                        <h3 class="text-3xl font-black text-emerald-400 mt-1" id="totalSurat">0</h3>
                    </div>
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 text-center shadow-sm">
                        <p class="text-xs text-slate-400 uppercase font-semibold">Mode Sistem</p>
                        <h3 class="text-sm font-bold text-red-400 mt-3 bg-red-950/50 py-1 px-3 rounded-full inline-block border border-red-900/40">ONLINE / LIVE</h3>
                    </div>
                </div>

                <!-- Log Master Data Surat -->
                <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-sm space-y-4">
                    <h3 class="font-bold text-slate-200 border-b border-slate-800 pb-3 text-sm uppercase tracking-wide">Log Seluruh Master Data Surat</h3>
                    <div class="text-center py-8 text-slate-500 text-sm italic">
                        Belum ada aktivitas surat masuk/keluar terparsing ke log admin hari ini.
                    </div>
                </div>
            </div>

            <!-- KOLOM KANAN: MANAJEMEN MASTER PEGAWAI (1/3 Lebar) -->
            <div class="space-y-6">
                <!-- Form Tambah -->
                <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-md space-y-4">
                    <h3 class="font-bold text-red-400 border-b border-slate-800 pb-2 text-sm uppercase tracking-wide">＋ Tambah Pegawai Baru</h3>
                    <form id="formPegawai" class="space-y-3">
                        <div>
                            <label class="block text-slate-400 text-xs font-semibold mb-1">Nama Lengkap & Gelar</label>
                            <input type="text" id="nama_pegawai" required placeholder="Contoh: drg. Amanda Putri" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-sm text-slate-100 focus:outline-none focus:border-red-700">
                        </div>
                        <div>
                            <label class="block text-slate-400 text-xs font-semibold mb-1">Jabatan / Unit Kerja</label>
                            <input type="text" id="jabatan" required placeholder="Contoh: Poli Gigi / Anak" class="w-full px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl text-sm text-slate-100 focus:outline-none focus:border-red-700">
                        </div>
                        <button type="submit" class="w-full bg-red-700 hover:bg-red-600 text-white font-bold py-2 rounded-xl text-sm transition shadow-md">
                            Simpan ke Database
                        </button>
                    </form>
                </div>

                <!-- Tabel Mini Pegawai -->
                <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-md space-y-3">
                    <h3 class="font-bold text-slate-200 border-b border-slate-800 pb-2 text-sm uppercase tracking-wide">Pegawai Terdaftar</h3>
                    <div class="overflow-y-auto max-h-[320px] pr-1 space-y-2" id="daftarPegawaiContainer">
                        <!-- Data dimuat dinamis di sini -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Integrasi Logika Script Master Data -->
    <script>
        document.addEventListener("DOMContentLoaded", muatPegawai);

        // Ambil Data Pegawai untuk dimuat ke list kanan
        function muatPegawai() {
            fetch('/api/pegawai')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('daftarPegawaiContainer');
                    container.innerHTML = '';
                    
                    if(data.length === 0) {
                        container.innerHTML = `<p class="text-xs text-slate-500 italic text-center py-4">Belum ada data pegawai.</p>`;
                        return;
                    }

                    data.forEach(p => {
                        container.innerHTML += `
                            <div class="bg-slate-950 p-3 rounded-xl border border-slate-850 flex justify-between items-center hover:border-slate-800 transition">
                                <div>
                                    <h4 class="text-sm font-bold text-slate-200">${p.nama_pegawai}</h4>
                                    <p class="text-xs text-slate-400">${p.jabatan}</p>
                                </div>
                                <button onclick="hapusPegawai(${p.id})" class="text-[10px] font-bold text-red-400 bg-red-950/40 hover:bg-red-900/50 px-2.5 py-1 rounded-lg border border-red-900/30 transition">
                                    Hapus
                                </button>
                            </div>
                        `;
                    });
                })
                .catch(err => console.error("Gagal memuat:", err));
        }

        // Tambah Pegawai via Fetch JSON murni yang sudah disinkronkan dengan server.js
        document.getElementById('formPegawai').addEventListener('submit', function(e) {
            e.preventDefault();
            const nama = document.getElementById('nama_pegawai').value;
            const jab = document.getElementById('jabatan').value;

            fetch('/api/pegawai/tambah', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nama_pegawai: nama, jabatan: jab })
            })
            .then(res => res.json())
            .then(res => {
                if(res.sukses) {
                    alert('Pegawai Berhasil Ditambahkan ke Pusat Data!');
                    document.getElementById('formPegawai').reset();
                    muatPegawai();
                } else {
                    alert('Gagal menyimpan ke database: ' + (res.pesan || 'Kesalahan Server'));
                }
            })
            .catch(err => alert('Eror komunikasi dengan database server. Pastikan server sudah di-restart!'));
        });

        // Hapus Data Pegawai
        function hapusPegawai(id) {
            if(confirm('Hapus pegawai ini dari daftar referensi aplikasi?')) {
                fetch(`/api/pegawai/hapus/${id}`, { method: 'DELETE' })
                    .then(res => res.json())
                    .then(res => {
                        if(res.sukses) muatPegawai();
                    });
            }
        }
    </script>
</body>
</html>
