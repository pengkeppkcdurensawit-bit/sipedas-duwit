<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEDAS DUWIT - Pelacakan Surat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans p-4 antialiased min-h-screen flex flex-col justify-center items-center">

    <div class="max-w-xl w-full space-y-6">
        <!-- Kartu Pencarian -->
        <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-xl text-center space-y-4">
            <div class="space-y-1">
                <h2 class="text-xl font-black text-emerald-700 tracking-tight">Lacak Surat & Dokumen</h2>
                <p class="text-xs text-gray-500">Masukkan No. Antrian, Nama/Perihal, atau Nomor Resmi Surat</p>
            </div>
            
            <form id="formLacak" class="flex gap-2">
                <input type="text" id="keyword" required 
                       placeholder="Contoh: ANTRI-2026..., Surat Tugas, atau 005/TU/..." 
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-2xl text-sm focus:outline-none focus:border-emerald-600 font-medium">
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-2.5 rounded-2xl text-sm transition shadow-sm">
                    Cari
                </button>
            </form>
        </div>

        <!-- Area Tampilan Hasil Pelacakan -->
        <div id="hasilPelacakan" class="hidden bg-white p-6 rounded-3xl border border-gray-100 shadow-xl space-y-4">
            <div class="border-b border-gray-100 pb-3">
                <span class="text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200" id="resStatus">
                    Status
                </span>
                <h3 class="text-base font-black text-gray-800 mt-2.5" id="resPerihal">Nama Surat</h3>
                <p class="text-xs text-gray-500 mt-0.5" id="resNomor">Nomor Surat: -</p>
            </div>

            <!-- Detail Dokumen -->
            <div class="grid grid-cols-2 gap-3 bg-slate-50 p-3.5 rounded-2xl text-xs">
                <div>
                    <p class="text-gray-400 font-medium">Asal Surat:</p>
                    <p class="font-bold text-gray-700 mt-0.5" id="resAsal">-</p>
                </div>
                <div>
                    <p class="text-gray-400 font-medium">Diteruskan Kepada:</p>
                    <p class="font-bold text-emerald-700 mt-0.5" id="resDisposisi">-</p>
                </div>
            </div>

            <!-- Timeline/Histori Perjalanan -->
            <div class="space-y-3">
                <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Histori Alur Berkas</h4>
                <div class="relative border-l-2 border-emerald-100 ml-2 pl-4 space-y-4" id="timelineHistori">
                    <!-- Data log perjalanan dimuat dinamis di sini -->
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formLacak').addEventListener('submit', function(e) {
            e.preventDefault();
            const keyword = document.getElementById('keyword').value;
            const boxHasil = document.getElementById('hasilPelacakan');

            fetch(`/api/lacak-surat?keyword=${encodeURIComponent(keyword)}`)
                .then(res => res.json())
                .then(res => {
                    if(!res.sukses) {
                        alert(res.pesan);
                        boxHasil.classList.add('hidden');
                        return;
                    }

                    // Tampilkan Box & Isi Data Utama Surat
                    boxHasil.classList.remove('hidden');
                    document.getElementById('resStatus').innerText = res.dataSurat.status_terakhir;
                    document.getElementById('resPerihal').innerText = res.dataSurat.perihal;
                    document.getElementById('resNomor').innerText = `Nomor Berkas: ${res.dataSurat.nomor_surat || 'Belum Terbit (Baru Antrian)'} | ID: ${res.dataSurat.id}`;
                    document.getElementById('resAsal').innerText = res.dataSurat.asal_surat;
                    document.getElementById('resDisposisi').innerText = res.dataSurat.disposisi_ke || 'Belum Ada Disposisi';

                    // Isi Data Timeline Histori
                    const timeline = document.getElementById('timelineHistori');
                    timeline.innerHTML = '';
                    
                    res.dataHistori.forEach(h => {
                        const waktu = new Date(h.tanggal_aksi).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
                        timeline.innerHTML += `
                            <div class="relative">
                                <div class="absolute -left-[21px] top-1 w-2.5 h-2.5 rounded-full bg-emerald-500 ring-4 ring-white"></div>
                                <p class="text-xs font-bold text-gray-800">${h.status}</p>
                                <p class="text-[10px] text-gray-400 mt-0.5">${waktu} • oleh: <span class="font-semibold">${h.oleh_user}</span></p>
                            </div>
                        `;
                    });
                })
                .catch(err => {
                    console.error(err);
                    alert('Gagal terhubung ke server pelacakan.');
                });
        });
    </script>
</body>
</html>
